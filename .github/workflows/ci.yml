name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Build module
        run: go build -o bundler main.go
      - name: Create test files
        run: |
          mkdir -p examples
          cat > examples/math.js << 'EOF'
          export function add(a, b) {
            return a + b;
          }
          EOF
          cat > examples/main.js << 'EOF'
          import { add } from './math.js';
          console.log('Sum:', add(2, 3));
          EOF
      - name: Run bundler
        run: ./bundler examples/main.js bundle.js
      - name: Test bundle output
        run: node bundle.js